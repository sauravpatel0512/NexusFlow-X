# Fails fast: pip/install → pytest → YAML parse. Each step name is the signal in the log.
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (requirements.txt)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests (pytest)
        run: python -m pytest tests/ -q --tb=short

      - name: Parse ingestion/quality_rules.yaml
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path

          import yaml

          path = Path("ingestion/quality_rules.yaml")
          if not path.is_file():
              print("FAIL: expected file missing:", path, file=sys.stderr)
              sys.exit(1)
          try:
              yaml.safe_load(path.read_text(encoding="utf-8"))
          except yaml.YAMLError as e:
              print("FAIL: quality_rules.yaml is not valid YAML:", e, file=sys.stderr)
              sys.exit(1)
          print("OK:", path)
          PY
